<!--
  dLogos graph viewer — self-contained, served by dlogos.ui.graph_app.

  Loads vis-network from a CDN (the user's browser fetches it; nothing is
  bundled or installed locally — HARD CONSTRAINT: no new Python dependency),
  fetches /graph.json from the same server, and renders an interactive,
  force-directed node-link graph of the loaded speakers / entities / claims and
  the edges between them. Nodes are coloured by 'group' with a legend; hovering
  a node shows its 'title'; edges are labelled by type. Physics is on so the
  layout settles, and nodes are draggable / zoomable.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>dLogos — graph viewer</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --speaker: #2563eb;   /* blue  */
      --entity:  #059669;   /* green */
      --claim:   #d97706;   /* amber */
      --bg:      #0f172a;
      --panel:   #1e293b;
      --text:    #e2e8f0;
      --muted:   #94a3b8;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 10px 16px;
      background: var(--panel);
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 600; }
    .stats { color: var(--muted); font-size: 12px; }
    .legend { display: flex; gap: 14px; margin-left: auto; flex-wrap: wrap; }
    .legend .item { display: flex; align-items: center; gap: 6px; font-size: 12px; }
    .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
    .swatch.speaker { background: var(--speaker); }
    .swatch.entity  { background: var(--entity); }
    .swatch.claim   { background: var(--claim); }
    #graph { flex: 1 1 auto; min-height: 0; }
    #status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      pointer-events: none;
    }
    #status.error { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <h1>dLogos graph viewer</h1>
    <span class="stats" id="stats">loading…</span>
    <div class="legend">
      <span class="item"><span class="swatch speaker"></span>speaker</span>
      <span class="item"><span class="swatch entity"></span>entity</span>
      <span class="item"><span class="swatch claim"></span>claim</span>
    </div>
  </header>
  <div id="graph"><div id="status">Fetching /graph.json …</div></div>

  <script>
    "use strict";

    var GROUP_COLORS = {
      speaker: "#2563eb",
      entity:  "#059669",
      claim:   "#d97706"
    };

    function setStatus(msg, isError) {
      var el = document.getElementById("status");
      if (!el) { return; }
      el.textContent = msg;
      el.className = isError ? "error" : "";
      el.style.display = msg ? "block" : "none";
    }

    // Normalize a raw /graph.json payload into vis-network DataSets. We accept
    // the canonical {nodes:[...], edges:[...]} shape; each node carries an id,
    // a 'group' (speaker|entity|claim), a 'label' and a 'title' (hover text),
    // and each edge carries from/to plus an optional type/label.
    function toVisData(graph) {
      var rawNodes = (graph && graph.nodes) || [];
      var rawEdges = (graph && graph.edges) || [];

      var nodes = rawNodes.map(function (n) {
        var group = n.group || "entity";
        return {
          id: n.id,
          label: n.label != null ? String(n.label) : String(n.id),
          group: group,
          title: n.title != null ? String(n.title) : undefined,
          color: GROUP_COLORS[group] || "#64748b",
          shape: group === "claim" ? "box" : "dot",
          value: n.value || 1
        };
      });

      var edges = rawEdges.map(function (e, i) {
        var label = e.label != null ? String(e.label) : (e.type || "");
        return {
          id: e.id != null ? e.id : ("e" + i),
          from: e.from != null ? e.from : e.src_id,
          to: e.to != null ? e.to : e.dst_id,
          label: label,
          title: label,
          arrows: "to"
        };
      });

      return { nodes: nodes, edges: edges };
    }

    function render(graph) {
      var data = toVisData(graph);
      var stats = document.getElementById("stats");
      if (stats) {
        stats.textContent =
          data.nodes.length + " nodes · " + data.edges.length + " edges";
      }
      if (!data.nodes.length) {
        setStatus("Graph is empty — nothing loaded yet.", false);
        return;
      }
      setStatus("", false);

      var container = document.getElementById("graph");
      var visData = {
        nodes: new vis.DataSet(data.nodes),
        edges: new vis.DataSet(data.edges)
      };
      var options = {
        physics: {
          enabled: true,
          stabilization: { iterations: 200 },
          barnesHut: { gravitationalConstant: -8000, springLength: 140 }
        },
        interaction: {
          hover: true,
          dragNodes: true,
          dragView: true,
          zoomView: true,
          tooltipDelay: 120
        },
        nodes: {
          font: { color: "#e2e8f0", size: 13 },
          borderWidth: 1,
          scaling: { min: 8, max: 30 }
        },
        edges: {
          color: { color: "#475569", highlight: "#cbd5e1" },
          font: { color: "#94a3b8", size: 10, strokeWidth: 0, background: "#0f172a" },
          smooth: { type: "dynamic" },
          arrows: { to: { scaleFactor: 0.6 } }
        }
      };
      new vis.Network(container, visData, options);
    }

    function load() {
      if (typeof vis === "undefined") {
        setStatus("Could not load vis-network from the CDN (offline?).", true);
        return;
      }
      fetch("/graph.json", { cache: "no-store" })
        .then(function (resp) {
          if (!resp.ok) { throw new Error("HTTP " + resp.status); }
          return resp.json();
        })
        .then(render)
        .catch(function (err) {
          setStatus("Failed to load /graph.json: " + err.message, true);
        });
    }

    window.addEventListener("load", load);
  </script>
</body>
</html>
